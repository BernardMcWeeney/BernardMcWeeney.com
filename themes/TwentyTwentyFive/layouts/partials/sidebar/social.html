<div class="bg-white p-6 rounded-lg shadow-sm">
    <h2 class="text-xl font-bold mb-4">Connect With Me</h2>
    <div class="grid grid-cols-2 gap-4">
        {{ with .Site.Params.social }}
            {{ range . }}
            <a href="{{ .URL }}" class="flex items-center gap-2 p-3 bg-gray-50 hover:bg-gray-100 rounded-lg" target="_blank" rel="noopener noreferrer">
                <i class="{{ .icon }}"></i>
                <span>{{ .platform }}</span>
            </a>
            {{ end }}
        {{ end }}
    </div>
</div>
